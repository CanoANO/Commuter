services:
  db:
    image: postgres:15
    container_name: commuter_db
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: commuter_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: commuter_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-commuter}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-commuter_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_init:
    build:
      context: .
      dockerfile: applications/web_app/Dockerfile
    container_name: commuter_db_init
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: /app:${PYTHONPATH:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -c "from components.database.session import init_db; init_db()"
    restart: "no"

  web:
    build:
      context: .
      dockerfile: applications/web_app/Dockerfile
    container_name: commuter_web
    ports:
      - "8000:8000"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AMQP_URL: ${AMQP_URL:-amqp://commuter:commuter_password@rabbitmq:5672/%2F}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      PYTHONPATH: /app:${PYTHONPATH:-}
    depends_on:
      db_init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    command: bash /app/scripts/start_all.sh

volumes:
  postgres_data:
